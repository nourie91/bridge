name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: CLI + compiler smoke test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund || true

      - name: CLI help
        run: node bin/bridge.js help

      - name: CLI version
        run: node bin/bridge.js version

      - name: Compiler loads without error
        run: node -e "require('./lib/compiler/compile.js')"

      - name: Package manifest parses
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"

      - name: Plugin manifests parse
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.cursor-plugin/plugin.json','utf8'))"

      - name: SessionStart hook executes
        run: bash hooks/session-start | node -e "let s=''; process.stdin.on('data',d=>s+=d); process.stdin.on('end',()=>{ const o=JSON.parse(s); if(!o.hookSpecificOutput) process.exit(1); })"
