<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      font-size: 12px;
      padding: 12px;
      color: var(--figma-color-text, #e0e0e0);
      background: var(--figma-color-bg, #2c2c2c);
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-weight: 500;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f44;
    }
    .dot.connected { background: #4c4; }
    .dot.connecting { background: #fa0; }
    .log {
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 4px;
      padding: 8px;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
    }
    .log-entry { opacity: 0.7; }
    .log-entry.cmd { color: #6cb6ff; opacity: 1; }
    .log-entry.ok { color: #4cc; opacity: 1; }
    .log-entry.err { color: #f66; opacity: 1; }
  </style>
</head>
<body>
  <div class="status">
    <div class="dot connecting" id="dot"></div>
    <span id="status">Connecting to Bridge server...</span>
  </div>
  <div class="log" id="log"></div>

  <script>
    var dot = document.getElementById('dot');
    var statusEl = document.getElementById('status');
    var logEl = document.getElementById('log');
    var ws = null;
    var reconnectInterval = null;

    function log(text, cls) {
      var entry = document.createElement('div');
      entry.className = 'log-entry' + (cls ? ' ' + cls : '');
      entry.textContent = text;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
      while (logEl.children.length > 50) {
        logEl.removeChild(logEl.firstChild);
      }
    }

    function connect() {
      try {
        ws = new WebSocket('ws://localhost:9001');
      } catch (e) {
        log('Connection failed: ' + e.message, 'err');
        return;
      }

      ws.onopen = function() {
        dot.className = 'dot connected';
        statusEl.textContent = 'Connected to Claude Code';
        log('Connected to Bridge server');
        if (reconnectInterval) {
          clearInterval(reconnectInterval);
          reconnectInterval = null;
        }
      };

      ws.onmessage = function(event) {
        try {
          var command = JSON.parse(event.data);
          log('< ' + command.action + (command.nodeId ? ' (' + command.nodeId + ')' : ''), 'cmd');
          parent.postMessage({ pluginMessage: command }, '*');
        } catch (e) {
          log('Parse error: ' + e.message, 'err');
        }
      };

      ws.onclose = function() {
        dot.className = 'dot';
        statusEl.textContent = 'Disconnected — waiting for server...';
        log('Disconnected from server');
        ws = null;
        if (!reconnectInterval) {
          reconnectInterval = setInterval(function() {
            log('Reconnecting...');
            connect();
          }, 3000);
        }
      };

      ws.onerror = function() {};
    };

    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (msg && msg.id) {
        if (msg.error) {
          log('> Error: ' + msg.error, 'err');
        } else {
          log('> OK', 'ok');
        }
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(msg));
        }
      }
    };

    connect();
  </script>
</body>
</html>
